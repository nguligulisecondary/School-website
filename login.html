<h2>Login</h2>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5pA1OaClbgBvZrBF5nBxBc-7PUiVHdEE",
  authDomain: "nguligulischool.firebaseapp.com",
  projectId: "nguligulischool",
  storageBucket: "nguligulischool.appspot.com",
  messagingSenderId: "628964333987",
  appId: "1:628964333987:web:5f8b148e0e6433cc396216"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Login Successful!");
      // Redirect to dashboard or enable forms
    })
    .catch((error) => {
      alert("Login Failed: " + error.message);
    });
});
</script>
