<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguliguli Secondary School - Results</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f2f7f2;
}
header{
    background:#1b5e20;
    color:white;
    padding:20px;
    text-align:center;
}
.section{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.result-box{
    background:#fafafa;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}
.pdf-link{
    display:inline-block;
    margin-top:8px;
    padding:6px 12px;
    background:#1b5e20;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>MATOKEO YA WANAFUNZI</h2>
</header>

<div class="section">
<h3>NECTA RESULTS</h3>
<div id="nectaResults"></div>
</div>

<div class="section">
<h3>INTERNAL RESULTS</h3>
<div id="internalResults"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "nguligulischool.firebaseapp.com",
  projectId: "nguligulischool",
  storageBucket: "nguligulischool.appspot.com",
  messagingSenderId: "628964333987",
  appId: "1:628964333987:web:5f8b148e0e6433cc396216"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function loadResults(collectionName, elementId){

  const q = query(
      collection(db, collectionName),
      orderBy("position","asc")   // 🔥 SORT BY POSITION
  );

  onSnapshot(q,(snapshot)=>{

    let html="";

    snapshot.forEach((doc)=>{
      const data = doc.data();

      html += `
        <div class="result-box">
          <h4>${data.position}. ${data.name} - ${data.class}</h4>
          <p>Marks: ${data.marks}</p>
          <p>Average: ${data.average}</p>
          ${data.pdf ? `<a href="${data.pdf}" target="_blank" class="pdf-link">Download PDF</a>` : ""}
        </div>
      `;
    });

    document.getElementById(elementId).innerHTML = html;

  });

}

// Load both
loadResults("nectaResults","nectaResults");
loadResults("internalResults","internalResults");

</script>

</body>
</html>
