<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguliguli Secondary School - Results</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#1b5e20;
color:white;
text-align:center;
padding:20px;
}

.container{
padding:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
background:#1b5e20;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.section{
display:none;
background:white;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.result-box{
background:#fafafa;
padding:10px;
margin:8px 0;
border-radius:6px;
}

a{
text-decoration:none;
color:#1b5e20;
font-weight:bold;
}

.back{
display:block;
margin-top:20px;
text-align:center;
}

.pdf{
background:#1b5e20;
color:white;
padding:5px 10px;
border-radius:5px;
display:inline-block;
margin-top:5px;
}

</style>
</head>

<body>

<header>
<h2>MATOKEO YA WANAFUNZI</h2>
</header>

<div class="container">

<button onclick="toggle('nectaSection')">
NECTA RESULTS
</button>

<div id="nectaSection" class="section">

<p>
🔗 Official NECTA Results:
<br>
<a href="https://www.necta.go.tz/results/" target="_blank">
Open NECTA Website
</a>
</p>

<div id="nectaResults"></div>

</div>


<button onclick="toggle('internalSection')">
INTERNAL RESULTS
</button>

<div id="internalSection" class="section">

<div id="internalResults"></div>

</div>

<div class="back">
<a href="index.html">⬅ Back Home</a>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyB5pA1OaClbgBvZrBF5nBxBc-7PUiVHdEE",
authDomain: "nguligulischool.firebaseapp.com",
projectId: "nguligulischool",
storageBucket: "nguligulischool.appspot.com",
messagingSenderId: "628964333987",
appId: "1:628964333987:web:5f8b148e0e6433cc396216",
measurementId: "G-JHGZ2L9M0V"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


function loadResults(collectionName, elementId){

const q = query(
collection(db, collectionName),
orderBy("position","asc")
);

onSnapshot(q,(snapshot)=>{

let html="";

if(snapshot.empty){
html="<p><b>No results posted yet</b></p>";
}

snapshot.forEach((doc)=>{

const data = doc.data();

html+=`

<div class="result-box">

<b>${data.position}. ${data.name}</b><br>

Class: ${data.class}<br>
Marks: ${data.marks}<br>
Average: ${data.average}<br>

${data.pdf ? `<a class="pdf" href="${data.pdf}" target="_blank">Download PDF</a>` : ""}

</div>

`;

});

document.getElementById(elementId).innerHTML=html;

});

}

loadResults("nectaResults","nectaResults");
loadResults("internalResults","internalResults");

window.toggle=function(id){

const section=document.getElementById(id);

section.style.display=
section.style.display==="none"?"block":"none";

}

</script>

</body>
</html>
