<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matokeo - Nguliguli Secondary School</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#1b5e20;
color:white;
text-align:center;
padding:20px;
}

.container{
padding:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
background:#1b5e20;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.section{
display:none;
background:white;
padding:15px;
border-radius:8px;
margin-top:10px;
}

.result-box{
background:#fafafa;
padding:10px;
margin:8px 0;
border-radius:6px;
}

.back{
display:block;
margin-top:20px;
text-align:center;
}

.pdf{
background:#1b5e20;
color:white;
padding:6px 12px;
border-radius:5px;
display:inline-block;
margin-top:5px;
text-decoration:none;
}

.necta-link{
display:block;
margin-bottom:15px;
background:#1565c0;
color:white;
padding:10px;
text-align:center;
border-radius:6px;
text-decoration:none;
}

.pdf-section{
margin-top:20px;
padding:15px;
background:#eef5ee;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h2>MATOKEO YA WANAFUNZI</h2>
</header>

<div class="container">

<button onclick="toggle('nectaSection')">
MATOKEO YA NECTA
</button>

<div id="nectaSection" class="section">

<a class="necta-link" href="https://matokeo.necta.go.tz/" target="_blank">
ANGALIA MATOKEO YA NECTA
</a>

</div>


<button onclick="toggle('internalSection')">
MATOKEO YA NDANI
</button>

<div id="internalSection" class="section">

<div id="internalResults"></div>

<div class="pdf-section">

<h3>📄 PAKUA MATOKEO YA MTIHANI (PDF)</h3>

<div id="examPdf"></div>

</div>

</div>

<div class="back">
<a href="index.html">⬅ Back</a>
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyB5pA1OaClbgBvZrBF5nBxBc-7PUiVHdEE",
authDomain: "nguligulischool.firebaseapp.com",
projectId: "nguligulischool",
storageBucket: "nguligulischool.appspot.com",
messagingSenderId: "628964333987",
appId: "1:628964333987:web:5f8b148e0e6433cc396216",
measurementId: "G-JHGZ2L9M0V"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


function loadInternalResults(){

const q=query(collection(db,"internalResults"),orderBy("position","asc"));

onSnapshot(q,(snapshot)=>{

let html="";

if(snapshot.empty){
html="<p><b>Hakuna matokeo yaliyopostiwa bado</b></p>";
}

snapshot.forEach((doc)=>{

const data=doc.data();

html+=`

<div class="result-box">

<b>${data.position}. ${data.name}</b><br>

Darasa: ${data.class}<br>
Alama: ${data.marks}<br>
Wastani: ${data.average}

</div>

`;

});

document.getElementById("internalResults").innerHTML=html;

});

}

loadInternalResults();



function loadPdf(){

const q=query(collection(db,"examPDF"));

onSnapshot(q,(snapshot)=>{

let html="";

snapshot.forEach((doc)=>{

const data=doc.data();

html+=`

<a class="pdf" href="${data.link}" target="_blank">
Pakua ${data.name}
</a><br>

`;

});

document.getElementById("examPdf").innerHTML=html;

});

}

loadPdf();


window.toggle=function(id){

const section=document.getElementById(id);

section.style.display=
section.style.display==="none"?"block":"none";

}

</script>

</body>
</html>
